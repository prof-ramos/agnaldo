# Ruff configuration for Agnaldo
# Docs: https://docs.astral.sh/ruff/

target-version = "py310"
line-length = 120
exclude = [
    ".git",
    ".github",
    ".venv",
    "__pycache__",
    "*.egg-info",
    "node_modules",
    "build",
    "dist",
]

[lint]
# Regras habilitadas
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate (comentários)
    "RUF",    # Ruff-specific rules
    "S",      # flake8-bandit (security)
    "A",      # flake8-builtins
    "COM",    # flake8-commas
    "DTZ",    # flake8-datetimez
    "T10",    # flake8-debugger
    "EXE",    # flake8-executable
    "ISC",    # flake8-implicit-str-concat
    "ICN",    # flake8-import-conventions
    "G",      # flake8-logging-format
    "INP",    # flake8-no-pep420
    "PIE",    # flake8-pie
    "PYI",    # flake8-pyi
    "PT",     # flake8-pytest-style
    "Q",      # flake8-quotes
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "SLF",    # flake8-self
    "SLOT",   # flake8-slots
    "TID",    # flake8-tidy-imports
    "T20",    # flake8-print
    "YTT",    # flake8-2020
]

# Regras ignoradas
ignore = [
    "E501",     # line too long (handled by formatter)
    "B008",     # function call in default argument
    "S101",     # assert used (ok in tests)
    "S104",     # hardcoded bind all interfaces
    "S105",     # hardcoded password string (usar env vars)
    "S608",     # SQL injection (já tratado com allowlist)
    "COM812",   # trailing comma missing (conflict with formatter)
    "ISC001",   # single-line implicit string concatenation
    "PT011",    # pytest.raises without match
    "SIM108",   # ternary operator (sometimes less readable)
    "T201",     # print statement (ok in scripts)
    "RUF012",   # mutable class attributes (Pydantic models)
]

# Per-file ignores
[lint.per-file-ignores]
"tests/*" = ["S101", "ARG", "SLF", "PT", "DTZ", "ERA"]
"scripts/*" = ["T201", "INP001"]
"__init__.py" = ["F401"]  # Allow unused imports in __init__.py
"src/main.py" = ["T201"]
"*.pyi" = ["ARG", "PYI"]

# Import conventions
[lint.flake8-import-conventions]
extend-aliases = { "datetime" = "dt" }

# Pytest style
[lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false
parametrize-names-type = "csv"

# Quotes
[lint.flake8-quotes]
inline-quotes = "double"
multiline-quotes = "double"
docstring-quotes = "double"

# Tidy imports
[lint.flake8-tidy-imports]
ban-relative-imports = "all"

[lint.flake8-tidy-imports.banned-api]
"typing.List".msg = "Use list instead of typing.List"
"typing.Dict".msg = "Use dict instead of typing.Dict"
"typing.Set".msg = "Use set instead of typing.Set"
"typing.Tuple".msg = "Use tuple instead of typing.Tuple"

# isort
[lint.isort]
known-first-party = ["src", "agnaldo"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

# Format
[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
